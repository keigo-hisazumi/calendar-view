# GitHub Pages デプロイワークフロー
# main ブランチへのプッシュ時に自動デプロイします。

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: 依存関係のインストール
        run: npm ci
      - name: ビルド
        run: npm run build
        env:
          NODE_ENV: production
      - name: GitHub Pages へのデプロイ
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true
          exclude_assets: 'pr-*'
